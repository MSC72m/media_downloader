name: Build & Release Windows Installer

on:
  push:
    tags:
      - "v*"

  # Allow manual triggering for testing the workflow
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest --cov-fail-under=25

      # ── PyInstaller Build ──────────────────────────────────────────
      - name: Build with PyInstaller
        run: uv run pyinstaller media_downloader.spec --noconfirm

      - name: Verify PyInstaller output
        run: |
          if (!(Test-Path "dist\MediaDownloader\MediaDownloader.exe")) {
            Write-Error "MediaDownloader.exe not found in dist\MediaDownloader\"
            exit 1
          }
          Write-Host "Build successful: dist\MediaDownloader\MediaDownloader.exe"
          $size = (Get-Item "dist\MediaDownloader\MediaDownloader.exe").Length / 1MB
          Write-Host "Executable size: $([math]::Round($size, 2)) MB"

      # ── Code Signing (optional) ────────────────────────────────────
      - name: Sign executable
        if: env.CODE_SIGNING_CERT != ''
        env:
          CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          # Decode certificate from base64
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = Join-Path $env:RUNNER_TEMP "code_signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1

          if ($signtool) {
            & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\MediaDownloader\MediaDownloader.exe"
          } else {
            Write-Warning "signtool.exe not found, skipping code signing"
          }

          # Clean up certificate
          Remove-Item $certPath -Force

      # ── Inno Setup Installer ───────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          # Inno Setup is pre-installed on windows-latest runners
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            # Try alternative path
            $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
          }
          if (!$iscc -or !(Test-Path $iscc)) {
            Write-Error "Inno Setup not found. Install it or check the runner image."
            exit 1
          }
          & $iscc installer.iss

      - name: Verify installer output
        id: installer
        run: |
          $version = "0.1.0"
          $installerPath = "installers\MediaDownloaderSetup-$version.exe"
          if (!(Test-Path $installerPath)) {
            Write-Error "Installer not found at $installerPath"
            exit 1
          }
          $size = (Get-Item $installerPath).Length / 1MB
          Write-Host "Installer size: $([math]::Round($size, 2)) MB"
          echo "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
          echo "installer_name=MediaDownloaderSetup-$version.exe" >> $env:GITHUB_OUTPUT

      # ── Sign Installer (optional) ──────────────────────────────────
      - name: Sign installer
        if: env.CODE_SIGNING_CERT != ''
        env:
          CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          $certPath = Join-Path $env:RUNNER_TEMP "code_signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1

          if ($signtool) {
            & $signtool.FullName sign /f $certPath /p $env:CODE_SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "${{ steps.installer.outputs.installer_path }}"
          }

          Remove-Item $certPath -Force

      # ── Upload Artifacts ───────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.installer.outputs.installer_path }}
          retention-days: 30

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/MediaDownloader/
          retention-days: 30

  # ── GitHub Release ───────────────────────────────────────────────
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Media Downloader ${{ steps.version.outputs.version }}"
          body: |
            ## Media Downloader ${{ steps.version.outputs.version }}

            ### Installation

            1. Download `MediaDownloaderSetup-0.1.0.exe` below
            2. Run the installer and follow the setup wizard
            3. On first launch, the app will download a browser component (~150 MB) for cookie generation -- this only happens once

            ### Requirements

            - Windows 10 or later
            - Internet connection (for first-run browser download)

            ### Notes

            - If Windows SmartScreen shows a warning, click "More info" then "Run anyway"
            - The browser component is stored in your user profile and persists across app updates
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
